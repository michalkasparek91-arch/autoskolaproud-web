<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<title>autoškola proud — brand foundations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand-shared.css">
<style>
  body { background: #EEEBE2; font-family: var(--body); color: var(--ink); }

  .frame { background: var(--bg); color: var(--paper); border-radius: var(--r-lg); padding: 48px; box-sizing: border-box; }
  .frame.paper { background: var(--paper); color: var(--ink); }

  .label-row { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display:flex; gap:8px; align-items:center; }
  .label-row .dot { width:6px; height:6px; border-radius:50%; background: var(--volt); display:inline-block; }

  /* Color palette */
  .swatch-grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .swatch { border-radius: var(--r-md); padding: 16px; height: 160px; display:flex; flex-direction:column; justify-content:space-between; box-sizing:border-box; border: 1px solid rgba(0,0,0,0.06); }
  .swatch .nm { font-family: var(--display); font-weight:600; font-size: 18px; letter-spacing:-0.02em; }
  .swatch .hex { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; opacity: 0.75; }

  /* Type specimen */
  .type-stack { display:flex; flex-direction:column; gap: 28px; }
  .type-row { border-top: 1px solid var(--line-paper); padding-top: 24px; display:grid; grid-template-columns: 180px 1fr; gap: 24px; align-items:start; }
  .type-row:first-child { border-top: none; padding-top: 0; }
  .type-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.6; }

  /* Logo cards */
  .logo-card { background: var(--bg); border-radius: var(--r-md); padding: 64px 48px; display:flex; align-items:center; justify-content:center; min-height: 220px; position: relative; }
  .logo-card.paper { background: var(--paper); }
  .logo-card.volt { background: var(--volt); }
  .logo-card .cnr { position:absolute; top: 14px; left: 14px; font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .logo-card.paper .cnr, .logo-card.volt .cnr { color: rgba(0,0,0,0.5); }

  /* Voltage bar */
  .voltage-row { display:flex; gap:0; align-items:stretch; height: 28px; border-radius: 999px; overflow:hidden; }
  .voltage-row > div { flex: 1; }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand-logos.jsx"></script>
<script type="text/babel">
const { useState } = React;

const palette = [
  { nm: "Ink",       hex: "#0A0B0A", fg: "#F4F2EC", role: "primary surface" },
  { nm: "Carbon",    hex: "#131412", fg: "#F4F2EC", role: "elevated dark" },
  { nm: "Paper",     hex: "#F4F2EC", fg: "#0A0B0A", role: "light surface" },
  { nm: "Bone",      hex: "#E8E5DC", fg: "#0A0B0A", role: "paper accent" },
  { nm: "Volt",      hex: "#D7F23A", fg: "#0A0B0A", role: "primary accent — current" },
  { nm: "Ion",       hex: "#6BC5FF", fg: "#0A0B0A", role: "secondary accent" },
];

function Page() {
  return (
    <DesignCanvas title="autoškola proud" subtitle="brand foundations · v01">

      {/* ============ LOGO ============ */}
      <DCSection id="logo" title="Logo system" subtitle="Wordmark + supporting marks. The dot is electrical — it carries current.">

        <DCArtboard id="lg-primary" label="A · Primary lockup — dark" width={760} height={300}>
          <div className="logo-card" style={{ width: 760, height: 300 }}>
            <span className="cnr">primary · on ink</span>
            <ProudWordmark size={92} />
          </div>
        </DCArtboard>

        <DCArtboard id="lg-paper" label="B · Primary lockup — paper" width={760} height={300}>
          <div className="logo-card paper" style={{ width: 760, height: 300 }}>
            <span className="cnr">primary · on paper</span>
            <ProudWordmark size={92} color="var(--ink)" accent="var(--volt-deep)" />
          </div>
        </DCArtboard>

        <DCArtboard id="lg-volt" label="C · Reverse on Volt" width={760} height={300}>
          <div className="logo-card volt" style={{ width: 760, height: 300 }}>
            <span className="cnr">reverse · on volt</span>
            <ProudWordmark size={92} color="var(--ink)" accent="var(--ink)" />
          </div>
        </DCArtboard>

        <DCArtboard id="lg-wordmark-only" label="D · Just 'proud.'" width={520} height={300}>
          <div className="logo-card" style={{ width: 520, height: 300 }}>
            <span className="cnr">short form · favicon, app</span>
            <ProudWordmark size={120} showAutoskola={false} />
          </div>
        </DCArtboard>

        <DCArtboard id="lg-mark-current" label="E · Current sigil" width={520} height={300}>
          <div className="logo-card" style={{ width: 520, height: 300, flexDirection: "column", gap: 24 }}>
            <span className="cnr">supporting mark · sine wave</span>
            <CurrentMark size={260} color="var(--volt)" stroke={3.2} />
            <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--muted)", letterSpacing: "0.08em", textTransform: "uppercase" }}>
              proud ~ current
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="lg-mark-bolt" label="F · Bolt sigil" width={520} height={300}>
          <div className="logo-card" style={{ width: 520, height: 300, flexDirection: "column", gap: 16 }}>
            <span className="cnr">supporting mark · bolt</span>
            <BoltMark size={170} color="var(--volt)" />
            <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--muted)", letterSpacing: "0.08em", textTransform: "uppercase" }}>
              voltage · alt
            </div>
          </div>
        </DCArtboard>

      </DCSection>

      {/* ============ PALETTE ============ */}
      <DCSection id="palette" title="Palette" subtitle="Ink + Paper as the backbone. Volt does the talking — everything else gets out of the way.">

        <DCArtboard id="pal-grid" label="Core swatches" width={1200} height={260}>
          <div className="frame paper" style={{ width: 1200, height: 260, padding: 32 }}>
            <div className="swatch-grid">
              {palette.map((c) => (
                <div key={c.nm} className="swatch" style={{ background: c.hex, color: c.fg }}>
                  <div className="nm">{c.nm}</div>
                  <div>
                    <div className="hex" style={{ marginBottom: 4 }}>{c.hex}</div>
                    <div className="hex" style={{ opacity: 0.55 }}>{c.role}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="pal-voltage" label="Voltage gradient · for charging UI" width={1200} height={180}>
          <div className="frame" style={{ width: 1200, height: 180, padding: 32 }}>
            <div className="label-row" style={{ marginBottom: 18 }}><span className="dot"></span> voltage ramp · 0v → 400v</div>
            <div className="voltage-row" style={{ marginBottom: 14 }}>
              <div style={{ background: "#131412" }}></div>
              <div style={{ background: "#2A3318" }}></div>
              <div style={{ background: "#566B1E" }}></div>
              <div style={{ background: "#8AAA28" }}></div>
              <div style={{ background: "#B8D421" }}></div>
              <div style={{ background: "#D7F23A" }}></div>
              <div style={{ background: "#E8FA66" }}></div>
              <div style={{ background: "#F4FCAA" }}></div>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontFamily:"var(--mono)", fontSize: 11, color: "var(--muted)", letterSpacing:"0.06em" }}>
              <span>0v</span><span>50</span><span>100</span><span>150</span><span>200</span><span>300</span><span>350</span><span>400v</span>
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="pal-pair" label="Contrast pairs in use" width={580} height={260}>
          <div style={{ width: 580, height: 260, display:"grid", gridTemplateColumns:"1fr 1fr", gap: 0 }}>
            <div style={{ background: "var(--bg)", color: "var(--paper)", padding: 28, display:"flex", flexDirection:"column", justifyContent:"space-between", borderRadius: "var(--r-md) 0 0 var(--r-md)" }}>
              <div className="label-row"><span className="dot"></span> ink · paper</div>
              <div style={{ fontFamily: "var(--display)", fontSize: 38, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1 }}>
                Řídit<br/>elektrické<br/>auto.
              </div>
            </div>
            <div style={{ background: "var(--volt)", color: "var(--ink)", padding: 28, display:"flex", flexDirection:"column", justifyContent:"space-between", borderRadius: "0 var(--r-md) var(--r-md) 0" }}>
              <div className="label-row" style={{ color: "rgba(0,0,0,0.55)" }}><span className="dot" style={{ background: "var(--ink)" }}></span> volt · ink</div>
              <div style={{ fontFamily: "var(--display)", fontSize: 38, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1 }}>
                Bez<br/>výfuku.<br/>Bez ladění.
              </div>
            </div>
          </div>
        </DCArtboard>

      </DCSection>

      {/* ============ TYPE ============ */}
      <DCSection id="type" title="Typography" subtitle="Space Grotesk for voice, Inter for body, JetBrains Mono for data and labels.">

        <DCArtboard id="ty-specimen" label="Specimen" width={1200} height={720}>
          <div className="frame paper" style={{ width: 1200, height: 720, padding: 48 }}>
            <div className="type-stack">

              <div className="type-row" style={{ paddingTop: 0, borderTop: "none" }}>
                <div className="type-meta">
                  Display<br/>
                  Space Grotesk<br/>
                  500 · −0.03em<br/>
                  88 / 0.92
                </div>
                <div style={{ fontFamily: "var(--display)", fontWeight: 500, fontSize: 88, lineHeight: 0.92, letterSpacing: "-0.035em", color: "var(--ink)" }}>
                  Řídíš proud.<br/>
                  <span style={{ color: "var(--volt-deep)" }}>Proud řídí tebe.</span>
                </div>
              </div>

              <div className="type-row">
                <div className="type-meta">
                  H2 · Section<br/>
                  Space Grotesk<br/>
                  600 · −0.025em<br/>
                  44 / 1.05
                </div>
                <div style={{ fontFamily: "var(--display)", fontWeight: 600, fontSize: 44, lineHeight: 1.05, letterSpacing: "-0.025em", color: "var(--ink)" }}>
                  První ostravská autoškola, která jezdí jen elektricky.
                </div>
              </div>

              <div className="type-row">
                <div className="type-meta">
                  Body<br/>
                  Inter<br/>
                  400 · 0<br/>
                  17 / 1.55
                </div>
                <div style={{ fontFamily: "var(--body)", fontWeight: 400, fontSize: 17, lineHeight: 1.55, color: "var(--ink-2)", maxWidth: 720 }}>
                  Vyrazíš s instruktorem do Poruby, Hrabové i centra Ostravy. Naučíš se rekuperovat na sjezdu z Rudné, plánovat nabíjení, parkovat couvací kamerou a hlavně — jezdit klidně, předvídavě a bezpečně. Bez ručního řazení. Bez výfukových zplodin. Bez kompromisů.
                </div>
              </div>

              <div className="type-row">
                <div className="type-meta">
                  Mono · Data<br/>
                  JetBrains Mono<br/>
                  400 · 0.04em<br/>
                  13 · uppercase
                </div>
                <div style={{ fontFamily: "var(--mono)", fontSize: 13, lineHeight: 1.7, letterSpacing: "0.04em", color: "var(--ink-2)", textTransform: "uppercase" }}>
                  KURZ B / 28 HODIN JÍZDY / 8 HODIN TEORIE<br/>
                  KAPACITA: 4 MÍSTA / ZBÝVÁ: 1<br/>
                  CENA: 19 900 KČ · MOŽNOST 0 % NA SPLÁTKY
                </div>
              </div>

            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="ty-scale" label="Type scale" width={580} height={720}>
          <div className="frame paper" style={{ width: 580, height: 720, padding: 36 }}>
            <div className="label-row" style={{ marginBottom: 24 }}><span className="dot"></span> scale · clamp values</div>
            {[
              { nm: "display-xl", size: 88, sample: "proud." },
              { nm: "display-l",  size: 64, sample: "Řídíš proud." },
              { nm: "h1",         size: 44, sample: "Kurzy & ceny" },
              { nm: "h2",         size: 28, sample: "Skupina B" },
              { nm: "h3",         size: 20, sample: "Instruktoři" },
              { nm: "body",       size: 17, sample: "Vyrazíš s instruktorem." },
              { nm: "small",      size: 14, sample: "Volej +420 777 ...", muted: true },
              { nm: "mono",       size: 11, sample: "REZERVACE · ZBÝVÁ 1 MÍSTO", mono: true },
            ].map((row) => (
              <div key={row.nm} style={{ display:"grid", gridTemplateColumns: "120px 1fr", gap: 16, alignItems:"baseline", borderTop:"1px solid var(--line-paper)", padding: "14px 0" }}>
                <div className="type-meta">{row.nm} · {row.size}</div>
                <div style={{
                  fontFamily: row.mono ? "var(--mono)" : "var(--display)",
                  fontWeight: row.mono ? 400 : 500,
                  fontSize: row.size,
                  letterSpacing: row.mono ? "0.06em" : "-0.025em",
                  textTransform: row.mono ? "uppercase" : "none",
                  color: row.muted ? "var(--muted)" : "var(--ink)",
                  lineHeight: 1
                }}>{row.sample}</div>
              </div>
            ))}
          </div>
        </DCArtboard>

      </DCSection>

      {/* ============ VOICE & SIGNAGE ============ */}
      <DCSection id="voice" title="Voice & motifs" subtitle="Dry, low-key, technical. Sentences are short. Numbers are precise.">

        <DCArtboard id="vo-tagline" label="Tagline pool — pick one or rotate" width={1200} height={320}>
          <div className="frame" style={{ width: 1200, height: 320, padding: 48, display:"grid", gridTemplateColumns:"1fr 1fr", gap: 24 }}>
            {[
              "Řídíš proud.",
              "Auto bez výfuku. Řidič bez stresu.",
              "Ostravská autoškola pod proudem.",
              "Nauč se řídit. Pak se rozhodni, jestli chceš spalovák.",
            ].map((t, i) => (
              <div key={i} style={{ borderTop: "1px solid var(--line)", paddingTop: 16, display:"flex", flexDirection:"column", justifyContent:"space-between" }}>
                <div className="label-row"><span className="dot"></span> tagline {String(i+1).padStart(2,"0")}</div>
                <div style={{ fontFamily: "var(--display)", fontSize: 30, fontWeight: 500, letterSpacing: "-0.025em", color: "var(--paper)", lineHeight: 1.1 }}>
                  {t}
                </div>
              </div>
            ))}
          </div>
        </DCArtboard>

        <DCArtboard id="vo-motif" label="Sine motif — page divider" width={1200} height={160}>
          <div className="frame" style={{ width: 1200, height: 160, padding: 0, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="1100" height="80" viewBox="0 0 1100 80" fill="none">
              <path
                d="M 0 40 Q 27.5 8, 55 40 T 110 40 T 165 40 T 220 40 T 275 40 T 330 40 T 385 40 T 440 40 T 495 40 T 550 40 T 605 40 T 660 40 T 715 40 T 770 40 T 825 40 T 880 40 T 935 40 T 990 40 T 1045 40 T 1100 40"
                stroke="var(--volt)"
                strokeWidth="2.2"
                fill="none"
              />
            </svg>
          </div>
        </DCArtboard>

      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
