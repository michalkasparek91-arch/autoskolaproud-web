<style>
/* autoškola proud — shared brand tokens */
:root {
  --bg: #0A0B0A;
  --bg-2: #131412;
  --paper: #F4F2EC;
  --paper-2: #E8E5DC;
  --ink: #0A0B0A;
  --ink-2: #2B2C2A;
  --muted: #6E6F6A;
  --line: #1F211E;
  --line-paper: #D9D6CB;
  /* electric current — sodium lime */
  --volt: #D7F23A;
  --volt-deep: #B8D421;
  --volt-glow: rgba(215, 242, 58, 0.35);
  /* secondary cool */
  --ion: #6BC5FF;

  --display: "Space Grotesk", system-ui, sans-serif;
  --body: "Inter", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;

  --r-sm: 6px;
  --r-md: 14px;
  --r-lg: 22px;
  --r-xl: 32px;
}

html, body { margin: 0; padding: 0; }
body {
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ====================================================
   Logo — solid wordmark + freehand current overlay (one stroke)
   ==================================================== */
.proud-mark {
  display: inline-flex;
  align-items: center;
  gap: 0.42em;
  font-family: "Bricolage Grotesque", var(--display);
  font-weight: 600;
  letter-spacing: -0.022em;
  line-height: 1;
  --pm-accent: var(--volt);
}

.proud-mark .pm-pre {
  font-family: var(--mono);
  font-weight: 400;
  font-size: 0.30em;
  letter-spacing: 0.04em;
  color: var(--muted);
  text-transform: lowercase;
  margin-right: 0.62em;
  align-self: center;
}

.proud-mark .pm-word {
  position: relative;
  display: inline-block;
  padding: 0.16em 0.26em 0.18em 0.06em;  /* breathing room for the overlay swoop */
}

/* The solid typographic word sits underneath */
.proud-mark .pm-text {
  position: relative;
  z-index: 1;
  display: inline-block;
}

/* Freehand current — a single hand-drawn stroke laid OVER the word */
.proud-mark .pm-current {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
  z-index: 2;            /* in front of the text */
}

/* Faint base line — the freehand stroke, always present but quiet */
.proud-mark .pm-wire {
  fill: none;
  stroke: var(--pm-accent);
  stroke-width: 1;
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
  opacity: 0.26;
}

/* Bright current — a short segment that runs THROUGH the base line */
.proud-mark .pm-spark {
  fill: none;
  stroke: var(--pm-accent);
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
  stroke-dasharray: 15 85;       /* short bright glide along a 100-unit path */
  stroke-dashoffset: 100;        /* parked just before the start */
  filter: drop-shadow(0 0 2px var(--pm-accent))
          drop-shadow(0 0 6px color-mix(in srgb, var(--pm-accent) 60%, transparent));
  animation: pm-flow 2.2s cubic-bezier(0.55, 0.05, 0.35, 0.95) 0.3s 1 forwards;
}

@keyframes pm-flow {
  0%   { stroke-dashoffset: 100; opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { stroke-dashoffset: -16; opacity: 0; }
}

/* Replay the current on hover */
.proud-mark:hover .pm-spark {
  animation: pm-flow 1.3s cubic-bezier(0.55, 0.05, 0.35, 0.95) 1 forwards;
}

/* The terminal node — the glowing "." the current ends on (SVG circle) */
.proud-mark .pm-node {
  fill: var(--pm-accent);
  transform-box: fill-box;
  transform-origin: center;
  opacity: 0.34;
  filter: drop-shadow(0 0 2px var(--pm-accent));
  animation: pm-node-receive 2.2s ease-out 0.3s 1 forwards;
}
.proud-mark:hover .pm-node {
  animation: pm-node-receive 1.3s ease-out 1 forwards;
}
@keyframes pm-node-receive {
  0%   { transform: scale(0.85); opacity: 0.4; }
  82%  { transform: scale(0.85); opacity: 0.4; filter: drop-shadow(0 0 2px var(--pm-accent)); }
  90%  { transform: scale(1.6);  opacity: 1; filter: drop-shadow(0 0 4px var(--pm-accent)) drop-shadow(0 0 12px var(--pm-accent)); }
  100% { transform: scale(1);    opacity: 1; filter: drop-shadow(0 0 2px var(--pm-accent)); }
}

/* Static fallback — base line + node visible, no motion */
@media (prefers-reduced-motion: reduce) {
  .proud-mark .pm-spark { animation: none; opacity: 0; }
  .proud-mark .pm-node  { animation: none; opacity: 0.6; transform: none; }
}

/* Striped placeholder for imagery slots */
.ph {
  position: relative;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.045) 0 8px,
      transparent 8px 16px),
    var(--bg-2);
  border: 1px solid var(--line);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: lowercase;
  letter-spacing: 0.04em;
  overflow: hidden;
}
.ph.paper {
  background:
    repeating-linear-gradient(135deg,
      rgba(0,0,0,0.04) 0 8px,
      transparent 8px 16px),
    var(--paper-2);
  border-color: var(--line-paper);
  color: #888;
}


/* autoškola proud — site styles */



* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--paper);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.55;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }

/* ---------- layout ---------- */
.wrap { width: 100%; max-width: 1360px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .wrap { padding: 0 20px; } }

/* ---------- buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px; border-radius: 999px; border: 1px solid transparent;
  font-family: var(--display); font-weight: 500; font-size: 15px;
  letter-spacing: -0.005em; transition: transform 0.15s ease, background 0.2s, color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn-volt { background: var(--volt); color: var(--ink); }
.btn-volt:hover { background: #E4FF4D; }
.btn-ghost { background: transparent; color: var(--paper); border-color: rgba(244, 242, 236, 0.18); }
.btn-ghost:hover { border-color: rgba(244, 242, 236, 0.4); }
.btn-ink { background: var(--ink); color: var(--paper); }
.btn-paper { background: var(--paper); color: var(--ink); }
.btn .arrow { transition: transform 0.2s ease; }
.btn:hover .arrow { transform: translateX(3px); }
.btn.lg { padding: 18px 30px; font-size: 17px; }
.btn.sm { padding: 10px 16px; font-size: 13px; }

/* ---------- nav ---------- */
.nav {
  position: fixed; top: var(--ann-h); left: 0; right: 0; z-index: 50;
  padding: 18px 0; transition: background 0.25s ease, backdrop-filter 0.25s;
}
.nav.scrolled {
  background: rgba(10, 11, 10, 0.72);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid rgba(244, 242, 236, 0.06);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.nav-links { display: flex; gap: 20px; font-family: var(--display); font-weight: 500; font-size: 13.5px; letter-spacing: -0.01em; }
.nav-links a { opacity: 0.7; transition: opacity 0.2s; white-space: nowrap; }
.nav-links a:hover { opacity: 1; }
.nav-cta { display: flex; gap: 12px; align-items: center; }
.nav-burger { display: none; background: transparent; border: 1px solid rgba(244, 242, 236, 0.18); padding: 10px 14px; border-radius: 999px; color: var(--paper); font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
@media (max-width: 1280px) {
  .nav-cta .btn-ghost { display: none; }
}
@media (max-width: 1120px) {
  .nav-links { display: none; }
  .nav-burger { display: inline-block; }
  .nav-cta .btn:not(.burger-btn) { display: none; }
}

.mobile-menu {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 80;
  height: 100dvh;
  background: var(--bg); padding: 56px 28px max(20px, env(safe-area-inset-bottom)); display: flex; flex-direction: column;
  transform: translateY(-100%); transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  overflow: hidden;
}
.mobile-menu.open { transform: translateY(0); }
.mobile-menu .mm-links { display: flex; flex-direction: column; flex: 1 1 auto; justify-content: center; min-height: 0; }
.mobile-menu a {
  font-family: var(--display); font-weight: 500;
  font-size: clamp(15px, 3.4vh, 26px);
  letter-spacing: -0.025em;
  padding: clamp(4px, 1vh, 13px) 0;
  border-bottom: 1px solid rgba(244, 242, 236, 0.08);
}
.mobile-menu .btn-volt {
  margin-top: clamp(12px, 2vh, 24px);
  flex: 0 0 auto;
  padding: clamp(11px, 1.6vh, 18px) 30px;
}
.mobile-menu .close {
  position: absolute; top: 16px; right: 18px;
  background: var(--volt); color: var(--ink);
  padding: 10px 14px; border-radius: 999px; border: none;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  z-index: 2;
}

/* ---------- hero ---------- */
.hero {
  padding: 140px 0 80px;
  position: relative;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 64px;
  align-items: end;
}
@media (max-width: 920px) { .hero-grid { grid-template-columns: 1fr; gap: 48px; } }

.hero h1 {
  font-family: var(--display); font-weight: 500;
  font-size: clamp(38px, 6vw, 92px);
  line-height: 0.96;
  letter-spacing: -0.035em;
  margin: 0;
  text-wrap: balance;
}
.hero h1 .accent { color: var(--volt); }
.hero h1 .strike {
  position: relative; display: inline-block; color: var(--muted);
}
.hero h1 .strike::after {
  content: ""; position: absolute; left: -2%; right: -2%; top: 52%;
  height: 6px; background: var(--volt); transform: skewY(-2deg);
}

.hero-meta {
  font-family: var(--mono);
  font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted);
  display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
  margin-bottom: 32px;
}
.hero-meta .hm-sep { color: var(--line); }
@media (max-width: 600px) { .hero-meta .hm-sep { display: none; } }
.hero-meta .pulse {
  width: 8px; height: 8px; border-radius: 50%; background: var(--volt);
  box-shadow: 0 0 0 0 var(--volt-glow);
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(215, 242, 58, 0.5); }
  100% { box-shadow: 0 0 0 14px rgba(215, 242, 58, 0); }
}

.hero-aside {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 28px;
}
.hero-aside .kicker {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--volt); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.hero-aside p {
  font-family: var(--display); font-size: 22px; line-height: 1.25;
  font-weight: 400; letter-spacing: -0.015em; margin: 0 0 24px;
}
.hero-aside .row {
  display: flex; justify-content: space-between; font-family: var(--mono);
  font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--muted); padding: 12px 0; border-top: 1px solid var(--line);
}
/* referral promo card inside hero aside */
.hero-promo {
  display: flex; align-items: center; gap: 14px;
  border: 1px solid var(--volt); border-radius: var(--r-md);
  background: rgba(215, 242, 58, 0.06);
  padding: 16px 18px; margin-top: 4px;
  transition: background 0.2s, transform 0.15s;
}
.hero-promo:hover { background: rgba(215, 242, 58, 0.12); transform: translateY(-1px); }
.hero-promo .hp-tag {
  flex: 0 0 auto;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--volt); color: var(--ink); padding: 6px 10px; border-radius: 999px; font-weight: 500;
}
.hero-promo .hp-body { font-family: var(--display); font-size: 15px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.25; color: var(--paper); }
.hero-promo .hp-more { display: block; color: var(--volt); font-size: 13px; margin-top: 2px; }
.hero-promo:hover .hp-more .arrow { transform: translateX(3px); display: inline-block; transition: transform 0.2s; }

/* hero background — animated current */
.hero-bg {
  position: absolute; inset: 0; z-index: -1;
  background:
    radial-gradient(ellipse 100% 60% at 80% 100%, rgba(215, 242, 58, 0.12), transparent 60%),
    radial-gradient(ellipse 60% 40% at 0% 0%, rgba(107, 197, 255, 0.05), transparent 70%);
}
.hero-current {
  position: absolute; left: 0; right: 0; bottom: 0; height: 220px;
  z-index: -1; opacity: 0.7;
  pointer-events: none;
}

/* ---------- announcement bar (top, looping) ---------- */
:root { --ann-h: 44px; }
.annbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 70;
  height: var(--ann-h);
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
  display: flex; align-items: center;
}
.annbar-track {
  display: flex; align-items: center; white-space: nowrap;
  animation: annflow 38s linear infinite;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--paper);
  will-change: transform;
}
.annbar .ann-lead { color: var(--muted); margin: 0 26px 0 0; }
.annbar .ann-item { display: inline-flex; align-items: center; gap: 9px; margin-right: 26px; }
.annbar .ann-item b { font-weight: 500; letter-spacing: 0.04em; }
.annbar .ann-item .sep { color: var(--muted); }
.annbar .ann-item .ann-note { color: var(--volt); }
.annbar .ann-item .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--volt);
  box-shadow: 0 0 8px 0 var(--volt-glow);
}
@keyframes annflow {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
@media (prefers-reduced-motion: reduce) {
  .annbar-track { animation: none; }
}

/* ---------- sections ---------- */
section { padding: 120px 0; position: relative; }
.section-head { margin-bottom: 64px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 48px; align-items: end; }
@media (max-width: 920px) { .section-head { grid-template-columns: 1fr; gap: 24px; } }
.section-head .kicker {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 10px;
}
.section-head .kicker .n { color: var(--volt); }
.section-head h2 {
  font-family: var(--display); font-weight: 500;
  font-size: clamp(34px, 5.5vw, 72px); line-height: 0.95;
  letter-spacing: -0.035em; margin: 16px 0 0;
}
.section-head .lead {
  font-family: var(--display); font-weight: 400;
  font-size: clamp(18px, 1.6vw, 24px); line-height: 1.35;
  letter-spacing: -0.012em; color: var(--paper);
  max-width: 56ch;
}

/* ---------- why electric ---------- */
.why { background: var(--bg); }
.why-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
  background: var(--line); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden;
}
@media (max-width: 920px) { .why-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 540px) { .why-grid { grid-template-columns: 1fr; } }
.why-grid-3 { grid-template-columns: repeat(3, 1fr); }
@media (max-width: 920px) { .why-grid-3 { grid-template-columns: 1fr; } }
.why-cell {
  background: var(--bg); padding: 36px 28px;
  display: flex; flex-direction: column; justify-content: space-between;
  min-height: 260px; transition: background 0.2s;
}
.why-cell:hover { background: var(--bg-2); }
.why-cell .num {
  font-family: var(--mono); font-size: 11px; color: var(--volt);
  letter-spacing: 0.06em;
}
.why-cell h3 {
  font-family: var(--display); font-weight: 500; font-size: 26px;
  line-height: 1.1; letter-spacing: -0.025em; margin: 18px 0 12px;
}
.why-cell p { font-size: 14px; color: var(--muted); line-height: 1.55; margin: 0; }

.stats {
  margin-top: 80px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
  border-top: 1px solid var(--line); padding-top: 48px;
}
@media (max-width: 720px) { .stats { grid-template-columns: 1fr 1fr; } }
.stat .n {
  font-family: var(--display); font-weight: 500;
  font-size: clamp(42px, 5vw, 64px); letter-spacing: -0.035em; line-height: 1;
}
.stat .n .v { color: var(--volt); }
.stat .l { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 12px; }

/* ---------- courses ---------- */
.courses { background: var(--bg); }
.course-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.course-tab {
  padding: 10px 18px; border-radius: 999px; border: 1px solid var(--line);
  background: transparent; color: var(--paper);
  font-family: var(--display); font-weight: 500; font-size: 14px;
  letter-spacing: -0.005em; transition: all 0.2s;
}
.course-tab:hover { border-color: rgba(244, 242, 236, 0.3); }
.course-tab.active { background: var(--volt); border-color: var(--volt); color: var(--ink); }

.course-card {
  display: grid; grid-template-columns: 1.3fr 1fr; gap: 56px;
  border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 48px; background: var(--bg-2);
  position: relative; overflow: hidden;
}
@media (max-width: 920px) { .course-card { grid-template-columns: 1fr; gap: 32px; padding: 32px; } }
.course-card .code-badge {
  position: absolute; top: 32px; right: 32px;
  font-family: var(--display); font-weight: 600; font-size: 120px;
  letter-spacing: -0.05em; line-height: 1; color: var(--volt); opacity: 0.18;
  pointer-events: none;
}
.course-card h3 {
  font-family: var(--display); font-weight: 500; font-size: 44px;
  letter-spacing: -0.03em; line-height: 1; margin: 0 0 8px;
}
.course-card .sub {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 24px;
}
.course-card .blurb {
  font-family: var(--display); font-size: 19px; line-height: 1.4;
  font-weight: 400; letter-spacing: -0.012em; margin: 0 0 32px;
  max-width: 48ch;
}
.course-card ul { list-style: none; padding: 0; margin: 0 0 32px; display: flex; flex-direction: column; gap: 10px; }
.course-card li {
  font-size: 14px; color: var(--paper); padding-left: 24px; position: relative;
  line-height: 1.5;
}
.course-card li::before {
  content: ""; position: absolute; left: 0; top: 9px; width: 12px; height: 2px;
  background: var(--volt); border-radius: 1px;
}

.course-meta {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.course-meta .cell {
  border: 1px solid var(--line); border-radius: var(--r-md); padding: 18px;
}
.course-meta .cell .l { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.course-meta .cell .v { font-family: var(--display); font-weight: 500; font-size: 22px; letter-spacing: -0.02em; line-height: 1.1; }
.course-meta .cell .v .small { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 6px; }

.price-block {
  margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--line);
  display: flex; align-items: end; justify-content: space-between; gap: 16px;
  flex-wrap: wrap;
}
.price-block .price {
  font-family: var(--display); font-weight: 500;
  font-size: 56px; letter-spacing: -0.04em; line-height: 1;
}
.price-block .price .cur { font-size: 24px; color: var(--muted); margin-left: 6px; }
.price-block .price-old {
  font-family: var(--mono); font-size: 13px; color: var(--muted);
  text-decoration: line-through; margin-bottom: 4px;
}

/* spots indicator */
.spots {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;

<script type="text/babel">
/* Reusable logo components for autoškola proud */

/**
 * ProudWordmark
 * Solid wordmark "proud" in Bricolage Grotesque, with the green "current"
 * laid OVER the type as a single freehand stroke — drawn on in one
 * continuous gesture on load (and replayed on hover), like signing the
 * word with an electric pen. The stroke ends on a glowing node (the ".").
 *
 * The stroke path has pathLength="100", so the draw-on dash math is
 * size-independent. The node is an SVG circle at the path's end point so
 * it stays perfectly registered to the stroke regardless of font size.
 */
const ProudWordmark = ({
  size = 80,
  color = "var(--paper)",
  accent = "var(--volt)",
  showAutoskola = true,
  autoskolaPos = "left",
}) => {
  // viewBox 1000 × 280, stretched (preserveAspectRatio none) over the word box.
  // Baseline ≈ y200, x-height top ≈ y120, ascender top ≈ y60.
  // One loose, hand-written gesture that sweeps over p-r-o-u-d and flicks
  // down to the period node at the end.
  const stroke =
    "M 30 158 " +
    "C 64 96 150 84 204 138 " +     // tight rising loop over the 'p'
    "C 250 184 330 188 400 140 " +  // flowing dip across 'r' 'o'
    "C 468 96 566 108 642 150 " +   // rise over 'u'
    "C 712 188 802 190 882 152 " +  // wave down through 'd'
    "C 916 134 940 178 962 202";    // flick down to the period node

  return (
    <span className="proud-mark" style={{ fontSize: `${size}px`, color, "--pm-accent": accent }}>
      {showAutoskola && autoskolaPos === "left" && (
        <span className="pm-pre">autoškola</span>
      )}
      <span className="pm-word">
        <span className="pm-text">proud</span>
        <svg
          className="pm-current"
          viewBox="0 0 1000 280"
          preserveAspectRatio="none"
          aria-hidden="true"
        >
          <path className="pm-wire"  d={stroke} pathLength="100" />
          <path className="pm-spark" d={stroke} pathLength="100" />
          <circle className="pm-node" cx="962" cy="202" r="7" />
        </svg>
      </span>
      {showAutoskola && autoskolaPos === "right" && (
        <span className="pm-pre" style={{ marginLeft: "0.62em", marginRight: 0 }}>autoškola</span>
      )}
    </span>
  );
};

// Sine-wave mark — current ripple as the 'proud' signature glyph
const CurrentMark = ({ size = 120, color = "var(--volt)", stroke = 2.4 }) => (
  <svg width={size} height={size * 0.5} viewBox="0 0 120 60" fill="none" style={{ display: "block" }}>
    <path
      d="M 4 30 Q 18 6, 32 30 T 60 30 T 88 30 T 116 30"
      stroke={color}
      strokeWidth={stroke}
      strokeLinecap="round"
      fill="none"
    />
    <circle cx="4" cy="30" r="3.2" fill={color} />
    <circle cx="116" cy="30" r="3.2" fill={color} />
  </svg>
);

// Lightning bolt mark — geometric, original
const BoltMark = ({ size = 80, color = "var(--volt)" }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="none" style={{ display: "block" }}>
    <path
      d="M 46 6 L 18 44 L 36 44 L 30 74 L 62 32 L 44 32 L 50 6 Z"
      fill={color}
    />
  </svg>
);

// Circular mark — "P" formed from a current loop with a node
const LoopMark = ({ size = 120, color = "var(--volt)", bg = "transparent", stroke = 6 }) => (
  <svg width={size} height={size} viewBox="0 0 120 120" fill="none" style={{ display: "block" }}>
    <circle cx="60" cy="60" r="54" fill={bg} stroke={color} strokeWidth={stroke} />
    <path d="M 46 36 L 46 90" stroke={color} strokeWidth={stroke} strokeLinecap="round" />
    <path d="M 46 36 L 70 36 Q 86 36 86 52 Q 86 68 70 68 L 46 68" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" />
    <circle cx="86" cy="52" r="6" fill={color} />
  </svg>
);

Object.assign(window, { ProudWordmark, CurrentMark, BoltMark, LoopMark });

</script>

const { useState, useEffect, useRef } = React;

/* ---------- Reveal hook ---------- */
function useReveal() {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setShown(true); obs.disconnect(); }
    }, { threshold: 0.12 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, shown ? "reveal in" : "reveal"];
}

<script type="text/babel">
// site-app.jsx — booking modal + main app shell
const { useState: useStateApp, useEffect: useEffectApp } = React;

/* ---------- Booking Modal (interactive multi-step) ---------- */
function BookingModal({ open, onClose, initialCourse }) {
  const [step, setStep] = useStateApp(0);
  const [form, setForm] = useStateApp({
    course: initialCourse || "b",
    cohort: 0,
    firstName: "", lastName: "", email: "", phone: "",
    pickup: "Poruba",
    payment: "full",
  });
  const [sent, setSent] = useStateApp(false);

  useEffectApp(() => {
    if (open && initialCourse) setForm((f) => ({ ...f, course: initialCourse }));
    if (open) { setStep(0); setSent(false); document.body.style.overflow = "hidden"; }
    else { document.body.style.overflow = ""; }
    return () => { document.body.style.overflow = ""; };
  }, [open, initialCourse]);

  if (!open) return null;

  const course = COURSES.find((c) => c.id === form.course);
  const cohorts = [
    { id: 0, label: "Ostrava",       date: "začátek 2. 9. 2026 · zbývá 5 míst" },
    { id: 1, label: "Opava",         date: "termín bude upřesněn" },
    { id: 2, label: "Frýdek-Místek", date: "termín bude upřesněn" },
  ];
  const totalBase = course.price;
  const total = totalBase;

  const steps = ["Kurz", "Termín", "Údaje", "Shrnutí"];
  const canNext = () => {
    if (step === 0) return !!form.course;
    if (step === 1) return form.cohort != null;
    if (step === 2) return form.firstName && form.lastName && form.email && form.phone;
    return true;
  };

  const submit = () => setSent(true);

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 100,
      background: "rgba(10, 11, 10, 0.86)", backdropFilter: "blur(14px)",
      display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
      animation: "fadein 0.25s ease",
    }}
    onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div className="booking-card" style={{ width: "100%", maxHeight: "92vh", overflow: "auto", position: "relative" }}>
        <button onClick={onClose} style={{
          position: "absolute", top: 20, right: 20, background: "transparent",
          border: "1px solid var(--line)", color: "var(--paper)", borderRadius: "50%",
          width: 36, height: 36, fontSize: 16
        }}>✕</button>

        {sent ? (
          <div className="success">
            <div className="check">✓</div>
            <h3>Hotovo. Voláme ti zítra.</h3>
            <p>
              Děkujeme, {form.firstName}. Potvrzení jsme poslali na <b style={{ color: "var(--paper)" }}>{form.email}</b>. Martin se ti ozve do 24 hodin a domluvíte první jízdu.
            </p>
            <button className="btn btn-volt lg" onClick={onClose}>Zavřít</button>
            <p style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--muted)", letterSpacing: "0.06em", marginTop: 32, textTransform: "uppercase" }}>
              Rezervační kód · PR-{Math.floor(Math.random() * 90000) + 10000}
            </p>
          </div>
        ) : (
          <React.Fragment>
            <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--muted)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 12 }}>
              přihláška · krok {step + 1} / {steps.length}
            </div>
            <h3 style={{ fontFamily: "var(--display)", fontWeight: 500, fontSize: 36, letterSpacing: "-0.03em", margin: "0 0 28px", lineHeight: 1 }}>
              {step === 0 && "Vyber kurz."}
              {step === 1 && "Vyber pobočku."}
              {step === 2 && "Pár údajů o tobě."}
              {step === 3 && "Tak co, jdeme do toho?"}
            </h3>

            <div className="steps">
              {steps.map((s, i) => (
                <div key={s} className={`step ${i === step ? "active" : i < step ? "done" : ""}`}>
                  {String(i + 1).padStart(2, "0")} · {s}
                </div>
              ))}
            </div>

            {step === 0 && (
              <div className="pick-grid">
                {COURSES.map((c) => (
                  <button key={c.id} className={`pick ${form.course === c.id ? "selected" : ""}`} onClick={() => setForm({ ...form, course: c.id })}>
                    <div className="nm">{c.code} · {c.name}</div>
                    <div className="pr">{c.price.toLocaleString("cs-CZ")} Kč · {c.duration}</div>
                  </button>
                ))}
              </div>
            )}

            {step === 1 && (
              <React.Fragment>
                <div className="pick-grid">
                  {cohorts.map((co) => (
                    <button key={co.id} className={`pick ${form.cohort === co.id ? "selected" : ""}`} onClick={() => setForm({ ...form, cohort: co.id })}>
                      <div className="nm">{co.label}</div>
                      <div className="pr">{co.date}</div>
                    </button>
                  ))}
                </div>
                <div style={{ marginTop: 20, padding: 16, border: "1px solid var(--line)", borderRadius: "var(--r-md)", background: "rgba(215, 242, 58, 0.04)", display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--volt)", color: "var(--ink)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, flexShrink: 0 }}>i</div>
                  <div>
                    <div style={{ fontFamily: "var(--display)", fontWeight: 500, fontSize: 15 }}>Jezdí se pouze s automatem.</div>
                    <div style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--muted)", letterSpacing: "0.04em", marginTop: 6, lineHeight: 1.5 }}>Řidičák získáš s kódem 78 — platí pro auta s automatickou převodovkou. Dnes je to 9 z 10 nových aut.</div>
                  </div>
                </div>
              </React.Fragment>
            )}

            {step === 2 && (
              <React.Fragment>
                <div className="field row2">
                  <div>
                    <label>Jméno</label>
                    <input value={form.firstName} onChange={(e) => setForm({ ...form, firstName: e.target.value })} placeholder="Jana" />
                  </div>
                  <div>
                    <label>Příjmení</label>
                    <input value={form.lastName} onChange={(e) => setForm({ ...form, lastName: e.target.value })} placeholder="Nováková" />
                  </div>
                </div>
                <div className="field">
                  <label>E-mail</label>
                  <input type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} placeholder="jana@email.cz" />
                </div>
                <div className="field">
                  <label>Telefon</label>
                  <input type="tel" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} placeholder="+420 777 ..." />
                </div>
                <div className="field">
                  <label>Forma platby</label>
                  <div className="pick-grid">
                    <button className={`pick ${form.payment === "full" ? "selected" : ""}`} onClick={() => setForm({ ...form, payment: "full" })}>
                      <div className="nm">Jednorázově</div>
                      <div className="pr">Sleva 500 Kč</div>
                    </button>
                    <button className={`pick ${form.payment === "6" ? "selected" : ""}`} onClick={() => setForm({ ...form, payment: "6" })}>
                      <div className="nm">6 splátek</div>
                      <div className="pr">0 % · cca {Math.round(total / 6).toLocaleString("cs-CZ")} Kč / měs.</div>
                    </button>
                    <button className={`pick ${form.payment === "12" ? "selected" : ""}`} onClick={() => setForm({ ...form, payment: "12" })}>
                      <div className="nm">12 splátek</div>
                      <div className="pr">0 % · cca {Math.round(total / 12).toLocaleString("cs-CZ")} Kč / měs.</div>
                    </button>
                  </div>
                </div>
              </React.Fragment>
            )}

            {step === 3 && (
              <div className="summary">
                <div className="row"><span>Kurz</span><b>{course.code} · {course.name}</b></div>
                <div className="row"><span>Termín</span><b>{cohorts[form.cohort].label} · {cohorts[form.cohort].date}</b></div>
                <div className="row"><span>Pobočka</span><b>{cohorts[form.cohort].label}</b></div>
                <div className="row"><span>Převodovka</span><b>Automat (kód 78)</b></div>
                <div className="row"><span>Jméno</span><b>{form.firstName} {form.lastName}</b></div>
                <div className="row"><span>E-mail</span><b>{form.email}</b></div>
                <div className="row"><span>Platba</span><b>{form.payment === "full" ? "Jednorázově" : `${form.payment} splátek`}</b></div>
                <div className="total">
                  <span>Celkem</span>
                  <span>{total.toLocaleString("cs-CZ")} Kč</span>
                </div>
              </div>
            )}

            <div className="booking-actions">
              {step > 0 ? (
                <button className="btn btn-ghost" onClick={() => setStep(step - 1)}>← Zpět</button>
              ) : <span></span>}
              {step < 3 ? (
                <button className="btn btn-volt" disabled={!canNext()} onClick={() => setStep(step + 1)} style={{ opacity: canNext() ? 1 : 0.45, cursor: canNext() ? "pointer" : "not-allowed" }}>
                  Pokračovat <span className="arrow">→</span>
                </button>
              ) : (
                <button className="btn btn-volt lg" onClick={submit}>
                  Odeslat přihlášku <span className="arrow">→</span>
                </button>
              )}
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ---------- Booking section ---------- */
function BookingCTA({ onBook }) {
  const [ref, cls] = useReveal();
  return (
    <section className="booking" id="booking" ref={ref}>
      {/* sine motif backdrop */}
      <svg viewBox="0 0 1440 400" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.18 }}>
        <path d="M 0 200 Q 90 80 180 200 T 360 200 T 540 200 T 720 200 T 900 200 T 1080 200 T 1260 200 T 1440 200" stroke="rgba(0,0,0,0.5)" strokeWidth="2" fill="none" />
        <path d="M 0 240 Q 90 120 180 240 T 360 240 T 540 240 T 720 240 T 900 240 T 1080 240 T 1260 240 T 1440 240" stroke="rgba(0,0,0,0.3)" strokeWidth="1.5" fill="none" />
        <path d="M 0 280 Q 90 160 180 280 T 360 280 T 540 280 T 720 280 T 900 280 T 1080 280 T 1260 280 T 1440 280" stroke="rgba(0,0,0,0.2)" strokeWidth="1" fill="none" />
      </svg>
      <div className={`wrap ${cls}`}>
        <div className="section-head">
          <div className="kicker"><span className="n">→</span> Přihláška</div>
          <div>
            <h2>Příští kurz<br />startuje 15. září.</h2>
            <p className="lead" style={{ marginTop: 24, color: "var(--ink-2)" }}>
              Zbývá <b>1 místo</b> z původních čtyř. Online přihláška ti zabere dvě minuty, do 24 hodin se ti ozve Martin a domluvíte první jízdu.
            </p>
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 16, flexWrap: "wrap" }}>
          <button className="btn btn-ink lg" onClick={() => onBook()}>
            Spustit přihlášku <span className="arrow">→</span>
          </button>
          <a href="tel:+420777123456" className="btn lg" style={{ background: "transparent", border: "1px solid rgba(0,0,0,0.2)", color: "var(--ink)" }}>
            Nebo zavolej · +420 777 123 456
          </a>
        </div>
      </div>
    </section>
  );
}

/* ---------- App ---------- */
function App() {
  const [bookingOpen, setBookingOpen] = useStateApp(false);
  const [initialCourse, setInitialCourse] = useStateApp(null);

  const openBooking = (courseId = null) => {
    setInitialCourse(courseId);
    setBookingOpen(true);
  };

  return (
    <React.Fragment>
      <Ticker />
      <Nav onBook={() => openBooking()} />
      <Hero onBook={() => openBooking()} />
      <HowToStart onBook={() => openBooking()} />
      <WhyElectric />
      <Courses onPickCourse={(id) => openBooking(id)} />
      <TheoryTests />
      <Instructors />
      <Fleet onBook={() => openBooking()} />
      <Routes />
      <BookingCTA onBook={() => openBooking()} />
      <Contact onBook={() => openBooking()} />
      <FAQ />
      <Footer />
      <BookingModal open={bookingOpen} onClose={() => setBookingOpen(false)} initialCourse={initialCourse} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
